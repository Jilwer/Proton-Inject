name: Build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 make pkg-config \
            libgl1-mesa-dev libegl1-mesa-dev libgles2-mesa-dev libx11-dev xorg-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build (release)
        run: make release

      - name: Create release package
        run: |
          mkdir -p release
          cp build/proton-inject release/
          cp README.md LICENSE release/

      - name: Create tarball
        run: tar -C release -czvf Proton-Inject-linux-amd64.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Proton-Inject
          path: Proton-Inject-linux-amd64.tar.gz
          retention-days: 90

      - name: Publish GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Proton-Inject-linux-amd64.tar.gz
          generate_release_notes: true
